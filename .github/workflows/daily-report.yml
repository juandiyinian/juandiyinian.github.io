name: Daily Tech Report Generator

on:
  schedule:
    - cron: '0 1 * * *'  # UTC 1:00 = 北京时间 9:00
  workflow_dispatch:
    inputs:
      report_date:
        description: '报告日期 (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Generate Daily Report
        id: generate
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            REPORT_DATE="${{ github.event.inputs.report_date }}"
          else
            REPORT_DATE=$(date +%Y-%m-%d)
          fi
          
          echo "report_date=$REPORT_DATE" >> $GITHUB_OUTPUT
          
          REPORT_FILE="content/posts/daily-tech-report-${REPORT_DATE}.md"
          
          cat > "$REPORT_FILE" << EOF
          ---
          title: "技术日报 - ${REPORT_DATE}"
          date: ${REPORT_DATE}T09:00:00+08:00
          draft: false
          tags: ["daily-report", "tech-news", "${REPORT_DATE}"]
          categories: ["技术日报"]
          author: "AI1001 Bot"
          ---
          
          # 技术日报 - ${REPORT_DATE}
          
          > 本报告由 AI1001 自动生成 | 生成时间: $(date '+%Y-%m-%d %H:%M:%S')
          
          ## 📰 今日热点
          
          ### 🤖 AI 前沿
          - **[待补充]**: AI 领域的最新进展和重要发布
          
          ### 💻 开发工具
          - **[待补充]**: 开发工具更新和实用工具推荐
          
          ### 🌐 开源项目
          - **[待补充]**: 值得关注的开源项目和 GitHub Trending
          
          ## 📊 数据统计
          
          - 报告生成时间: $(date '+%Y-%m-%d %H:%M:%S')
          - 数据来源: AI1001 技术监控系统
          - 报告日期: ${REPORT_DATE}
          
          ---
          
          *本报告由 AI1001 自动发布系统生成*
          
          **[查看历史日报](/posts/)** | **[关于我们](/about/)**
          EOF
          
          echo "✅ 报告已生成: $REPORT_FILE"
          echo "report_file=$REPORT_FILE" >> $GITHUB_OUTPUT

      - name: Commit and Push
        run: |
          git config user.name "AI1001 Bot"
          git config user.email "bot@ai1001.com"
          git add content/posts/
          git diff --cached --quiet || git commit -m "Add daily tech report for ${{ steps.generate.outputs.report_date }}"
          git push

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --gc --minify --baseURL "https://juandiyinian.github.io/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Feishu Notification
        if: success()
        run: |
          REPORT_DATE="${{ steps.generate.outputs.report_date }}"
          REPORT_URL="https://juandiyinian.github.io/posts/daily-tech-report-${REPORT_DATE}/"
          
          # 发送飞书消息
          if [ -n "$FEISHU_WEBHOOK" ]; then
            curl -X POST "$FEISHU_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{
                \"msg_type\": \"text\",
                \"content\": {
                  \"text\": \"📰 技术日报已发布\\n\\n日期: ${REPORT_DATE}\\n\\n🔗 阅读链接: ${REPORT_URL}\\n\\n💡 每天早上9点自动推送\\n\"
                }
              }"
            echo "✅ 飞书消息已发送"
          else
            echo "⚠️ 未配置 FEISHU_WEBHOOK"
            echo "报告链接: $REPORT_URL"
          fi